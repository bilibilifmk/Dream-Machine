<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Machine</title>
  <style>
    @font-face {
      font-family: 'SmileySans';
      src: url('/static/SmileySans-Oblique.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SmileySans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      overflow: hidden;
    }

    /* 背景图 + 模糊遮罩 */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: url(/static/login/login.jpg) center/cover no-repeat;
    }
    #bg::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    /* 卡片 */
    .card {
      position: relative; z-index: 1;
      width: 380px;
      padding: 48px 40px 40px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 标题区 */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 72px; height: 72px;
      margin: 0 auto 12px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(251, 114, 153, 0.45);
      border: 2px solid rgba(251, 114, 153, 0.6);
    }
    .brand-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .brand h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
    .brand p  { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 4px; }

    /* 输入框 */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 7px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap .icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; opacity: 0.45; pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-text-fill-color: #fff;
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }
    .input-wrap input:focus {
      border-color: #FB7299;
      background: rgba(251,114,153,0.07);
      box-shadow: 0 0 0 3px rgba(251,114,153,0.18);
    }
    /* 自动填充覆盖 */
    .input-wrap input:-webkit-autofill,
    .input-wrap input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 100px rgba(30,15,20,0.95) inset;
      -webkit-text-fill-color: #fff;
    }

    /* 错误提示 */
    #error-msg {
      display: none;
      align-items: center;
      gap: 7px;
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(232, 68, 90, 0.15);
      border: 1px solid rgba(232, 68, 90, 0.35);
      color: #ff8096;
      font-size: 13px;
      animation: shake 0.35s ease;
    }
    #error-msg.show { display: flex; }
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%    { transform: translateX(-6px); }
      60%    { transform: translateX(6px); }
    }
    #error-msg svg { width: 15px; height: 15px; flex-shrink: 0; fill: #ff8096; }

    /* 登录按钮 */
    .btn {
      width: 100%;
      margin-top: 6px;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #FB7299, #e8445a);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s, transform 0.1s;
      box-shadow: 0 4px 18px rgba(251, 114, 153, 0.4);
    }
    .btn:hover  { opacity: 0.9; box-shadow: 0 6px 24px rgba(251,114,153,0.55); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* 加载动画 */
    .btn .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner  { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <img src="/static/img/user.jpg" alt="user" />
      </div>
      <h1>Dream Machine</h1>
      <p>服务器管理系统</p>
    </div>

    <div id="error-msg">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="error-text">用户名或密码错误</span>
    </div>

    <div class="field">
      <label>用户名</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        <input id="username" type="text" placeholder="请输入用户名" autocomplete="username" />
      </div>
    </div>

    <div class="field">
      <label>密码</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
      </div>
    </div>

    <button class="btn" id="login-btn" onclick="doLogin()">
      <span class="btn-text">登 录</span>
      <div class="spinner"></div>
    </button>
  </div>

  <script>
    function showError(msg) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.classList.remove('show');
      void el.offsetWidth; // reflow 触发动画重放
      el.classList.add('show');
    }

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      if (!username) { showError('请输入用户名'); return; }
      if (!password) { showError('请输入密码'); return; }

      btn.classList.add('loading');
      btn.disabled = true;
      document.getElementById('error-msg').classList.remove('show');

      try {
        const fd = new FormData();
        fd.append('username', username);
        fd.append('password', password);
        const res = await fetch('/login', { method: 'POST', body: fd });
        if (res.redirected) {
          window.location.href = res.url;
        } else {
          showError('用户名或密码错误');
        }
      } catch {
        showError('网络错误，请稍后重试');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
