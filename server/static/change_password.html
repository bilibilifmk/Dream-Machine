<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>用户登录</title>
		 <style>
* {
	padding: 0;
	margin: 0;
	box-sizing: border-box;
}
body {
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
}


#web_bg{
  position:fixed;
  top: 0;
  left: 0;
  width:100%;
  height:100%;
  min-width: 1000px;
  z-index:-10;
  zoom: 1;
  background-color: #fff;
  background-repeat: no-repeat;
  background-size: cover;
  -webkit-background-size: cover;
  -o-background-size: cover;
  background-position: center 0;
}


.login {
	display: flex;
	flex-direction: column;
	align-items: center;
	width: 400px;
	padding: 40px;
	background-color: rgba(0, 0, 0, 0.2);
	box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4);
}
.login h2 {
	color: #fff;
	margin-bottom: 30px;
}
.login .login_box {
	position: relative;
	width: 100%;
}
.login .login_box input {
	outline: none;
	border: none;
	width: 100%;
	padding: 10px 0;
	margin-bottom: 30px;
	color: #fff;
	font-size: 16px;
	border-bottom: 1px solid #fff;
	background-color: transparent;
}
.login .login_box label {
	position: absolute;
	top: 0;
	left: 0;
	padding: 10px 0;
	color: #fff;
	pointer-events: none;

	transition: all 0.5s;
}
.login .login_box input:focus + label,
.login .login_box input:valid + label {
	top: -20px;
	color: #FB7299;
	font-size: 12px;
}
.login a {
	overflow: hidden;
	position: relative;
	padding: 10px 20px;
	color: #FB7299;
	text-decoration: none;
	transition: all 0.5s;
}
.login a:hover {
	color: #fff;
	border-radius: 5px;
	background-color: #FB7299;
	box-shadow: 0 0 5px #FB7299, 0 0 25px #FB7299, 0 0 50px #FB7299,
		0 0 100px #FB7299;
}
.login a span {
	position: absolute;
}
 </style>


	</head>
	<body>

		<div id="web_bg" style="background-image: url(/static/login/login.jpg);"></div>

		<div class="login">
			<h2>login 密码修改</h2>

			<div class="login_box">
				<input type="password" required="required" /><label>新密码</label>
			</div>
			<a href="#" onclick="login()">修改</a>
		</div>
	
		<script>
            function login() {
                const password = document.querySelectorAll('.login_box input')[0].value;
                const formData = new FormData();
                formData.append('new_password', password);
                fetch('/change_password', {
                    method: 'POST',
                    body: formData
                }).then(response => {
                    if (response.redirected) {
                        window.location.href = response.url;
                    } else {
                        response.text().then(text => alert("修改失败确认已经登录"));
                    }
                }).catch(error => {
                    console.error('登录请求失败:', error);
                    alert('登录时发生错误，请稍后重试');
                });
            }
			document.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                login();
            }
       		});
		</script>
	</body>
</html>
